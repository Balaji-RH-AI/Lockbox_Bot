<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Questionnaire → Prompt Generator</title>
  <style>
    :root { --bg:#0f172a; --panel:#1e293b; --panel2:#172033; --accent:#3b82f6; --text:#e2e8f0; --muted:#94a3b8; --ok:#22c55e; --err:#ef4444; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, "Segoe UI", sans-serif; background:var(--bg); color:var(--text); }
    header { padding:18px 28px; border-bottom:1px solid #334155; display:flex; align-items:center; gap:14px; }
    header h1 { font-size:18px; margin:0; font-weight:600; }
    header .sub { color:var(--muted); font-size:13px; }
    .wrap { display:grid; grid-template-columns: 380px 1fr; gap:0; height:calc(100vh - 61px); }
    .left { padding:24px; border-right:1px solid #334155; overflow:auto; }
    .right { padding:24px; overflow:auto; }
    label { display:block; font-size:13px; color:var(--muted); margin:16px 0 6px; }
    input[type=text], textarea { width:100%; background:var(--panel2); border:1px solid #334155; color:var(--text); border-radius:8px; padding:10px; font-size:14px; font-family:inherit; }
    textarea { min-height:180px; resize:vertical; }
    .drop { border:2px dashed #334155; border-radius:10px; padding:20px; text-align:center; color:var(--muted); cursor:pointer; transition:.15s; }
    .drop.hover { border-color:var(--accent); color:var(--text); }
    button { background:var(--accent); color:#fff; border:0; border-radius:8px; padding:11px 16px; font-size:14px; font-weight:600; cursor:pointer; }
    button:disabled { opacity:.5; cursor:default; }
    button.ghost { background:transparent; border:1px solid #334155; color:var(--text); }
    .row { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
    .status { margin-top:14px; font-size:13px; min-height:18px; }
    .status.err { color:var(--err); } .status.ok { color:var(--ok); }
    .card { background:var(--panel); border:1px solid #334155; border-radius:10px; padding:16px; margin-bottom:14px; }
    .card h3 { margin:0 0 4px; font-size:15px; }
    .card .intro { color:var(--muted); font-size:13px; margin-bottom:10px; }
    .field { font-size:13px; padding:6px 0; border-top:1px solid #243049; display:flex; justify-content:space-between; gap:10px; }
    .field:first-of-type { border-top:0; }
    .pill { background:#243049; color:var(--muted); border-radius:6px; padding:1px 7px; font-size:11px; }
    pre { background:var(--panel2); border:1px solid #334155; border-radius:10px; padding:14px; overflow:auto; font-size:12px; max-height:340px; }
    .tabs { display:flex; gap:8px; margin-bottom:14px; }
    .tabs button { background:transparent; border:1px solid #334155; color:var(--muted); padding:7px 12px; font-weight:500; }
    .tabs button.active { background:var(--accent); color:#fff; border-color:var(--accent); }
    .empty { color:var(--muted); text-align:center; margin-top:80px; }
    a.link { color:var(--accent); text-decoration:none; font-size:13px; }
    .spinner { display:inline-block; width:14px; height:14px; border:2px solid #fff5; border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; vertical-align:-2px; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <h1>Questionnaire → Prompt Generator</h1>
    <span class="sub">Upload a Word/PDF questionnaire (or paste text) → generate a chatbot prompt + cards</span>
    <span style="flex:1"></span>
    <a class="link" href="/run" target="_blank">Open runtime ↗</a>
  </header>

  <div class="wrap">
    <div class="left">
      <label>Source document (Word / PDF / text)</label>
      <div id="drop" class="drop">
        <div id="dropText">Drop a file here, or click to browse</div>
        <input id="file" type="file" accept=".docx,.doc,.pdf,.txt,.md" hidden />
      </div>

      <label>…or paste the questionnaire text</label>
      <textarea id="text" placeholder="Paste questionnaire content here"></textarea>

      <label>Form title (optional)</label>
      <input id="title" type="text" placeholder="e.g. Vendor Onboarding Questionnaire" />

      <div class="row">
        <button id="gen">Generate</button>
        <button id="genActivate" class="ghost">Generate &amp; activate</button>
      </div>
      <div id="status" class="status"></div>

      <hr style="border-color:#334155; margin:22px 0" />
      <label>Stored forms</label>
      <div id="forms" style="font-size:13px; color:var(--muted)">…</div>
    </div>

    <div class="right">
      <div id="result" class="empty">Generated prompt, schema &amp; cards will appear here.</div>
      <div id="output" style="display:none">
        <div class="tabs">
          <button data-tab="cards" class="active">Cards</button>
          <button data-tab="prompt">System Prompt</button>
          <button data-tab="schema">Extraction Schema</button>
          <button data-tab="promptsjs">prompts.js</button>
        </div>
        <div class="row" style="margin-top:0; margin-bottom:14px">
          <button id="dlPrompts" class="ghost">Download prompts.js</button>
          <button id="dlDef" class="ghost">Download definition.json</button>
          <button id="activate">Set as active form</button>
          <a id="tryIt" class="link" href="/run" target="_blank" style="align-self:center">Try it in runtime ↗</a>
        </div>
        <div id="tab-cards"></div>
        <pre id="tab-prompt" style="display:none"></pre>
        <pre id="tab-schema" style="display:none"></pre>
        <pre id="tab-promptsjs" style="display:none"></pre>
      </div>
    </div>
  </div>

  <script>
    const $ = (s) => document.querySelector(s);
    let currentDef = null;

    // ── File drop / browse ──
    const drop = $('#drop'), fileInput = $('#file');
    let chosenFile = null;
    drop.addEventListener('click', () => fileInput.click());
    drop.addEventListener('dragover', (e) => { e.preventDefault(); drop.classList.add('hover'); });
    drop.addEventListener('dragleave', () => drop.classList.remove('hover'));
    drop.addEventListener('drop', (e) => {
      e.preventDefault(); drop.classList.remove('hover');
      if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', () => fileInput.files[0] && setFile(fileInput.files[0]));
    function setFile(f) { chosenFile = f; $('#dropText').textContent = '📄 ' + f.name; }

    function setStatus(msg, kind) { const s = $('#status'); s.className = 'status ' + (kind || ''); s.innerHTML = msg; }

    async function generate(activate) {
      const text = $('#text').value.trim();
      if (!chosenFile && !text) { setStatus('Provide a file or paste some text.', 'err'); return; }
      setStatus('<span class="spinner"></span> Generating… this can take 10–30s', '');
      $('#gen').disabled = $('#genActivate').disabled = true;
      try {
        const fd = new FormData();
        if (chosenFile) fd.append('file', chosenFile);
        if (text) fd.append('text', text);
        fd.append('title', $('#title').value.trim());
        fd.append('activate', activate ? 'true' : 'false');
        const r = await fetch('/generate', { method: 'POST', body: fd });
        const j = await r.json();
        if (!r.ok) throw new Error(j.error || 'Generation failed');
        currentDef = j.def;
        render(j.def);
        setStatus('✓ Generated “' + j.def.meta.title + '”' + (j.active ? ' and set active.' : '.'), 'ok');
        loadForms();
      } catch (e) {
        setStatus('Error: ' + e.message, 'err');
      } finally {
        $('#gen').disabled = $('#genActivate').disabled = false;
      }
    }
    $('#gen').addEventListener('click', () => generate(false));
    $('#genActivate').addEventListener('click', () => generate(true));

    function fieldLine(f, depth) {
      const pad = depth ? ' style="padding-left:' + depth * 14 + 'px"' : '';
      const meta = [f.type, f.required ? 'required' : '', f.validate || '', f.repeat ? 'repeat' : '']
        .filter(Boolean).map((m) => '<span class="pill">' + m + '</span>').join(' ');
      let html = '<div class="field"' + pad + '><span>' + esc(f.label || f.key) + '</span><span>' + meta + '</span></div>';
      if (Array.isArray(f.fields)) html += f.fields.map((sf) => fieldLine(sf, (depth || 0) + 1)).join('');
      return html;
    }
    function esc(s) { return String(s == null ? '' : s).replace(/[&<>]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c])); }

    function render(def) {
      $('#result').style.display = 'none';
      $('#output').style.display = 'block';
      $('#tab-cards').innerHTML = (def.cards || []).length
        ? def.cards.map((c) =>
            '<div class="card"><h3>' + esc(c.title || c.id) + ' <span class="pill">' + esc(c.id) + '</span></h3>' +
            '<div class="intro">' + esc(c.intro || '') + '</div>' +
            (c.fields || []).map((f) => fieldLine(f, 0)).join('') + '</div>'
          ).join('')
        : '<div class="empty" style="margin-top:20px">No cards — this questionnaire is fully conversational.</div>';
      $('#tab-prompt').textContent = def.systemPrompt || '';
      $('#tab-schema').textContent = JSON.stringify(def.extractionSchema || {}, null, 2);
      // prompts.js preview is fetched lazily on demand
      $('#tab-promptsjs').textContent = '// Click “Download prompts.js”, or fetch from /api/form/prompts.js?id=' + def.meta.id;
      const dl = (path) => () => window.open(path, '_blank');
      $('#dlPrompts').onclick = dl('/api/form/prompts.js?id=' + encodeURIComponent(def.meta.id));
      $('#dlDef').onclick = dl('/api/form/definition.json?id=' + encodeURIComponent(def.meta.id));
      $('#activate').onclick = async () => {
        await fetch('/api/forms/active', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: def.meta.id }) });
        setStatus('✓ “' + def.meta.title + '” is now the active form.', 'ok'); loadForms();
      };
    }

    // tabs
    document.querySelectorAll('.tabs button').forEach((b) =>
      b.addEventListener('click', () => {
        document.querySelectorAll('.tabs button').forEach((x) => x.classList.remove('active'));
        b.classList.add('active');
        ['cards', 'prompt', 'schema', 'promptsjs'].forEach((t) => {
          $('#tab-' + t).style.display = t === b.dataset.tab ? 'block' : 'none';
        });
      })
    );

    async function loadForms() {
      try {
        const r = await fetch('/api/forms'); const j = await r.json();
        $('#forms').innerHTML = (j.forms || []).length
          ? j.forms.map((f) => {
              const active = f.id === j.active;
              return '<div style="padding:6px 0; display:flex; justify-content:space-between; gap:8px">' +
                '<span>' + (active ? '● ' : '○ ') + esc(f.title) + '</span>' +
                (active ? '<span class="pill">active</span>'
                        : '<a class="link" href="#" data-act="' + esc(f.id) + '">activate</a>') + '</div>';
            }).join('')
          : 'None yet.';
        $('#forms').querySelectorAll('a[data-act]').forEach((a) =>
          a.addEventListener('click', async (e) => {
            e.preventDefault();
            await fetch('/api/forms/active', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: a.dataset.act }) });
            loadForms();
          })
        );
      } catch { $('#forms').textContent = 'Could not load forms.'; }
    }
    loadForms();
  </script>
</body>
</html>
